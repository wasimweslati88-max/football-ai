<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المباريات - Football AI</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <i class="fas fa-futbol"></i>
      <span>Football AI</span>
    </div>
    <div class="nav-links">
      <a href="/">الرئيسية</a>
      <a href="/matches" class="active">المباريات</a>
      <a href="/dashboard">لوحتي</a>
    </div>
    <div class="nav-actions">
      <button id="logoutBtn" class="btn btn-danger">
        <i class="fas fa-sign-out-alt"></i> خروج
      </button>
    </div>
  </nav>

  <main class="matches-page">
    <h1><i class="fas fa-futbol"></i> جميع المباريات</h1>

    <div class="filters">
      <select id="leagueFilter">
        <option value="">كل الدوريات</option>
        <option value="Premier League">الدوري الإنجليزي</option>
        <option value="La Liga">الدوري الإسباني</option>
        <option value="Bundesliga">الدوري الألماني</option>
        <option value="Serie A">الدوري الإيطالي</option>
        <option value="Ligue 1">الدوري الفرنسي</option>
      </select>
      <select id="riskFilter">
        <option value="">كل المستويات</option>
        <option value="low">مخاطر منخفضة</option>
        <option value="medium">مخاطر متوسطة</option>
        <option value="high">مخاطر عالية</option>
      </select>
      <button id="filterBtn" class="btn btn-primary">
        <i class="fas fa-filter"></i> تصفية
      </button>
    </div>

    <div id="matchesList" class="matches-list">
      <div class="loading-card">جاري تحميل المباريات...</div>
    </div>
  </main>

  <div id="loadingOverlay" class="loading-overlay" style="display:none;">
    <div class="spinner"></div>
    <p>جاري التحميل...</p>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/matches.js"></script>
</body>
</html>
