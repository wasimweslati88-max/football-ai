<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - Football AI</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <i class="fas fa-futbol"></i>
        <h1>Football AI</h1>
      </div>
      <h2>تسجيل الدخول</h2>
      <p>أدخل كود الدخول للوصول إلى التحليلات</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="accessCode"><i class="fas fa-key"></i> كود الدخول</label>
          <input type="text" id="accessCode" name="accessCode" placeholder="أدخل كود الدخول" required autocomplete="off">
        </div>
        <div class="form-group">
          <label for="userName"><i class="fas fa-user"></i> الاسم (اختياري)</label>
          <input type="text" id="userName" name="name" placeholder="اسمك">
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-large">
          <i class="fas fa-sign-in-alt"></i> دخول
        </button>
        <div id="loginError" class="error-message"></div>
        <div id="loginSuccess" class="success-message"></div>
      </form>

      <div class="auth-links">
        <a href="/" class="back-link"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
      </div>
    </div>
  </div>

  <div id="loadingOverlay" class="loading-overlay" style="display:none;">
    <div class="spinner"></div>
    <p>جاري التحقق...</p>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
